services:
  mysql:
    image: mysql:8.4
    container_name: gcfeed-mysql
    environment:
      MYSQL_ROOT_PASSWORD: sealos123
      MYSQL_DATABASE: GCFeed
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: gcfeed-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: gcfeed-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gcfeed-api
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./api/configs/config.docker.yaml:/app/configs/config.yaml:ro
      - api_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gcfeed-worker
    command: ["./gcfeed-worker"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./api/configs/config.docker.yaml:/app/configs/config.yaml:ro

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: gcfeed-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  api_uploads:
